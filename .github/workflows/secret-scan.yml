name: Secret Scan
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - name: Scan for secrets
        run: |
          echo "Scanning for leaked secrets..."
          FOUND=0
          for pattern in 'sk-[a-zA-Z0-9]{20,}' 'ghp_[a-zA-Z0-9]{36}' 'AKIA[0-9A-Z]{16}' 'sk-ant-[a-zA-Z0-9]{20,}'; do
            if grep -rPn "$pattern" --include='*.py' --include='*.js' --include='*.ts' --include='*.yml' --include='*.yaml' --include='*.json' --include='*.env' --include='*.toml' --include='*.cfg' --include='*.md' . 2>/dev/null; then
              echo "ALERT: Pattern $pattern found!"
              FOUND=1
            fi
          done
          if [ "$FOUND" -eq 1 ]; then
            echo "::error::Potential secrets detected in source files"
            exit 1
          fi
          echo "No secrets found."
