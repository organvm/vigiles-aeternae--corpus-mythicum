name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Check README exists
        run: test -f README.md && echo "README.md found"
      - name: Validate seed.yaml
        run: |
          if [ -f seed.yaml ]; then
            python3 -c "import yaml; yaml.safe_load(open('seed.yaml'))" && echo "seed.yaml valid"
          fi
