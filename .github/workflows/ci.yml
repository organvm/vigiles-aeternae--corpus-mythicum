name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - name: Check README exists
        run: test -f README.md && echo "README.md found"
      - name: Validate seed.yaml
        run: |
          if [ -f seed.yaml ]; then
            python3 -c "import yaml; yaml.safe_load(open('seed.yaml'))" && echo "seed.yaml valid"
          fi
      - name: Run tests
        run: make test
